<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Furnish Store</title>
  </head>
  <body>
    <!-- Navigation -->
    <nav
      class="navbar navbar-expand-lg bg-white shadow-sm px-4 py-3 navbar-custom"

      <div class="container-fluid px-0">
        <a class="navbar-brand" href="index.html">
          <span class="d-flex flex-column text-uppercase text-xs fw-bold lh-sm">
            <span class="" style="letter-spacing: 0.12rem">Furnish</span>
            <span>Template</span>
          </span>
        </a>

        <div class="mx-auto d-lg-block d-none">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About us</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="products.html">Products</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="testimonials.html">Testimonials</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Contact</a>
            </li>
          </ul>
        </div>

        <div class="d-flex align-items-center gap-4">
          <span class="d-flex align-items-center gap-2 fw-bold">
            <span>
              <i class="bi bi-telephone"></i>
            </span>
            <span>+901234576</span>
          </span>
          <a
            class=""
            data-bs-toggle="offcanvas"
            href="#offcanvasExample"
            role="button"
            aria-controls="offcanvasExample"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              fill="currentColor"
              class="bi bi-list"
              viewBox="0 0 16 16"
            >
              <path
                fill-rule="evenodd"
                d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"
              />
            </svg>
          </a>
        </div>
      </div>
    </nav>

    <!-- Login Section -->
    <main>
      <section class="py-lg-8 pt-6 pb-lg-8">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-5 col-md-6 col-12">
              <!-- Login Card -->
              <div class="shadow-lg rounded-3 p-6 bg-white">
                <div class="text-center mb-6">
                  <h1 class="h3 fw-bold mb-2">Welcome Back</h1>
                  <p class="text-muted" style="font-size: 0.95rem">
                    Sign in to your Furnish Store account
                  </p>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="needs-validation" novalidate>
                  <!-- Email Input -->
                  <div class="mb-4">
                    <label for="email" class="form-label fw-semibold"
                      >Email Address</label
                    >
                    <input
                      type="email"
                      class="form-control form-control-lg"
                      id="email"
                      placeholder="Enter your email"
                      required
                    />
                    <div class="invalid-feedback d-block">
                      Please enter a valid email address.
                    </div>
                  </div>

                  <!-- Password Input -->
                  <div class="mb-4">
                    <label for="password" class="form-label fw-semibold"
                      >Password</label
                    >
                    <div class="input-group">
                      <input
                        type="password"
                        class="form-control form-control-lg"
                        id="password"
                        placeholder="Enter your password"
                        required
                      />
                      <button
                        class="btn btn-outline-secondary"
                        type="button"
                        id="togglePassword"
                        style="border-color: #dee2e6"
                      >
                        <i class="bi bi-eye"></i>
                      </button>
                    </div>
                    <div class="invalid-feedback d-block">
                      Password is required.
                    </div>
                  </div>

                  <!-- Remember Me & Forgot Password -->
                  <div
                    class="d-flex justify-content-between align-items-center mb-4"
                  >
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="rememberMe"
                      />
                      <label class="form-check-label" for="rememberMe">
                        Remember me
                      </label>
                    </div>
                    <a
                      href="#"
                      class="text-decoration-none fw-semibold"
                      style="color: #d47f31"
                      >Forgot Password?</a
                    >
                  </div>

                  <!-- Login Button -->
                  <button
                    type="submit"
                    class="btn btn-dark btn-lg w-100 fw-semibold py-3 mb-4"
                  >
                    <span id="loginBtnText">Sign In</span>
                    <span
                      id="loginSpinner"
                      class="spinner-border spinner-border-sm ms-2"
                      role="status"
                      style="display: none"
                    >
                      <span class="visually-hidden">Loading...</span>
                    </span>
                  </button>

                  <!-- Divider -->
                  <div class="position-relative mb-4">
                    <hr class="my-3" />
                    <span
                      class="position-absolute top-50 start-50 translate-middle bg-white px-3"
                      style="font-size: 0.875rem; color: #6c757d"
                      >OR</span
                    >
                  </div>

                  <!-- Social Login -->
                  <div class="d-grid gap-2">
                    <button
                      type="button"
                      class="btn btn-outline-secondary btn-lg py-3"
                    >
                      <i class="bi bi-google"></i> Continue with Google
                    </button>
                  </div>
                </form>

                <!-- Sign Up Link -->
                <div class="text-center mt-5">
                  <p class="text-muted">
                    Don't have an account?
                    <a
                      href="register.html"
                      class="text-decoration-none fw-semibold"
                      style="color: #d47f31"
                      >Sign Up</a
                    >
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer placeholder -->
    <footer class="bg-dark text-white py-6 mt-8">
      <div class="container text-center">
        <p>&copy; 2024 Furnish Store. All rights reserved.</p>
      </div>
    </footer>

    <!-- Scripts -->
    <script type="module" src="./assets/js/main.js"></script>
    <script>
      // Toggle Password Visibility
      document
        .getElementById("togglePassword")
        ?.addEventListener("click", function () {
          const passwordInput = document.getElementById("password");
          const icon = this.querySelector("i");

          if (passwordInput.type === "password") {
            passwordInput.type = "text";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");
          } else {
            passwordInput.type = "password";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
          }
        });

      // Form Validation & Submit
      document
        .getElementById("loginForm")
        ?.addEventListener("submit", async function (e) {
          e.preventDefault();

          // Bootstrap validation
          if (!this.checkValidity()) {
            e.stopPropagation();
            this.classList.add("was-validated");
            return;
          }

          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          const rememberMe = document.getElementById("rememberMe").checked;

          // Show loading state
          const loginBtn = this.querySelector('button[type="submit"]');
          const spinner = document.getElementById("loginSpinner");
          const btnText = document.getElementById("loginBtnText");

          loginBtn.disabled = true;
          spinner.style.display = "inline-block";
          btnText.textContent = "Signing In";

          try {
            // Call API
            const response = await fetch(
              "http://localhost:5000/api/v1/auth/login",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  email,
                  password,
                }),
              },
            );

            const data = await response.json();

            if (response.ok && data.status === "success") {
              // Save token & user info
              localStorage.setItem("authToken", data.data.token);
              if (rememberMe) {
                localStorage.setItem("userEmail", email);
              }
              localStorage.setItem("user", JSON.stringify(data.data.user));

              // Show success message
              alert("Login successful!");

              // Redirect to dashboard/home
              window.location.href = "index.html";
            } else {
              alert(data.message || "Login failed. Please try again.");
            }
          } catch (error) {
            console.error("Login error:", error);
            alert("An error occurred. Please try again later.");
          } finally {
            loginBtn.disabled = false;
            spinner.style.display = "none";
            btnText.textContent = "Sign In";
          }
        });

      // Auto-fill email if "Remember Me" was checked before
      window.addEventListener("DOMContentLoaded", () => {
        const savedEmail = localStorage.getItem("userEmail");
        if (savedEmail) {
          document.getElementById("email").value = savedEmail;
          document.getElementById("rememberMe").checked = true;
        }
      });
    </script>
  </body>
</html>
