<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đã hủy thanh toán - Maverik Store</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; background: #f8f8f6; font-family: "Inter", sans-serif; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }
      .navbar { background: #fff; border-bottom: 1px solid #ebebeb; padding: 14px 24px; display: flex; align-items: center; }
      .brand { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; color: #1a1a1a; }
      .page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
      .card { background: #fff; border: 1px solid #e8e8e8; max-width: 540px; width: 100%; padding: 56px 48px; text-align: center; }
      .icon { font-size: 64px; margin-bottom: 24px; display: block; color: #e65100; }
      .title { font-size: 1.5rem; font-weight: 300; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 12px; }
      .subtitle { font-size: 0.9rem; color: #666; margin-bottom: 32px; line-height: 1.6; }
      .info-box { background: #fff8f3; border: 1px solid #ffe0c4; padding: 16px 20px; margin-bottom: 28px; font-size: 0.86rem; color: #6d3a00; border-radius: 2px; text-align: left; }
      .btn-group { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
      .btn { padding: 14px 28px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; text-decoration: none; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: background 0.2s; }
      .btn-primary { background: #1a1a1a; color: #fff; }
      .btn-primary:hover { background: #333; }
      .btn-outline { background: #fff; color: #1a1a1a; border: 1.5px solid #1a1a1a; }
      .btn-outline:hover { background: #f5f5f5; }
      @media (max-width: 600px) { .card { padding: 36px 24px; } .btn { width: 100%; justify-content: center; } .btn-group { flex-direction: column; } }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html" class="brand"><div>Maverik</div><div>Store</div></a>
    </nav>
    <div class="page-wrap">
      <div class="card" id="card">
        <i class="bi bi-hourglass-split icon"></i>
        <div class="title">Đang tải...</div>
      </div>
    </div>
    <script>
      /**
       * ✅ SECURITY: Dùng textContent / createElement — KHÔNG innerHTML với URL data.
       */
      function createEl(tag, cls, text) {
        const el = document.createElement(tag);
        if (cls) el.className = cls;
        if (text !== undefined) el.textContent = String(text);
        return el;
      }

      const p       = new URLSearchParams(window.location.search);
      const orderId = p.get("orderId") || "—";

      function render() {
        const card = document.getElementById("card");
        card.innerHTML = "";

        const icon = createEl("i", "bi bi-slash-circle icon");
        icon.style.color = "#e65100";
        card.appendChild(icon);

        card.appendChild(createEl("div", "title", "Đã hủy thanh toán"));

        const sub = createEl("div", "subtitle");
        sub.textContent = "Bạn đã hủy giao dịch. Đơn hàng của bạn vẫn được giữ nguyên.";
        card.appendChild(sub);

        // Info box
        const infoBox = createEl("div", "info-box");
        const orderLine = createEl("p");
        orderLine.style.margin = "0 0 6px";
        orderLine.textContent = "Mã đơn hàng: #" + orderId;
        const hint = createEl("p");
        hint.style.margin = "0";
        hint.textContent = "Bạn có thể thanh toán lại bất cứ lúc nào từ trang đơn hàng.";
        infoBox.appendChild(orderLine);
        infoBox.appendChild(hint);
        card.appendChild(infoBox);

        // Buttons
        const btnGroup = createEl("div", "btn-group");
        const a1 = createEl("a", "btn btn-primary", "Thanh toán lại");
        a1.href = "profile.html#orders";
        const a2 = createEl("a", "btn btn-outline", "Về trang chủ");
        a2.href = "index.html";
        btnGroup.appendChild(a1);
        btnGroup.appendChild(a2);
        card.appendChild(btnGroup);
      }

      render();
    </script>
  </body>
</html>
